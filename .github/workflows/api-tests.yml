name: API Tests

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t bookstore-api-tests .

      - name: Generate Allure report
        run: |
          docker run --rm \
          -e BASE_URL=https://fakerestapi.azurewebsites.net \
          -v ${{ github.workspace }}/target:/app/target \
          bookstore-api-tests \
          test
          
      - name: Generate Allure report files
        run: |
          mkdir -p allure-report
          allure generate target/allure-results -o allure-report

      - name: Upload Allure report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: surefire-test-report
          path: target/site/